<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Fira+Code:wght@400;500&family=Source+Sans+3:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1814;
  --paper: #f5f0e8;
  --paper2: #ede8df;
  --paper3: #e3ddd3;
  --line: rgba(26,24,20,0.12);
  --line2: rgba(26,24,20,0.22);
  --muted: #8a8278;
  --accent: #c4622d;
  --accent2: #a84e22;
  --green: #4a7c59;
  --radius: 4px;
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
  opacity: 0.6;
}

header {
  padding: 1.4rem 3rem;
  border-bottom: 1px solid var(--line2);
  display: flex;
  align-items: baseline;
  gap: 1.5rem;
}

.wordmark {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.wordmark em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}

.srv-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
  font-family: 'Fira Code', monospace;
  margin-left: auto;
}

.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
.dot.ok  { background: var(--green); }
.dot.err { background: var(--accent); }

main { max-width: 860px; margin: 0 auto; padding: 3rem 2rem 5rem; }

/* ── Upload ── */
#upload-zone {
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  padding: 4rem 2rem;
  text-align: center;
  cursor: pointer;
  position: relative;
  transition: background 0.2s, border-color 0.2s;
  background: var(--paper2);
}
#upload-zone:hover, #upload-zone.drag {
  background: var(--paper3);
  border-color: var(--accent);
}
#upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

.up-glyph {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 1rem;
  opacity: 0.6;
}
#upload-zone h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 400; margin-bottom: 0.4rem; }
#upload-zone p  { font-size: 13px; color: var(--muted); margin-bottom: 1.2rem; }

.formats {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.fmt {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  background: var(--paper);
  border: 1px solid var(--line2);
  color: var(--muted);
  padding: 3px 9px;
  border-radius: 2px;
  letter-spacing: 0.04em;
}

/* ── Settings bar ── */
#sbar {
  display: none;
  background: var(--paper2);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  padding: 1rem 1.4rem;
  margin-top: 1rem;
  align-items: center;
  gap: 1.2rem;
  flex-wrap: wrap;
}

.fbadge {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'Fira Code', monospace;
  font-size: 12px;
  color: var(--ink);
  background: var(--paper);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  padding: 5px 11px;
}
.fbadge-icon { color: var(--accent); }

.fld { display: flex; align-items: center; gap: 8px; }
.fld label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.fld input {
  background: var(--paper);
  border: 1px solid var(--line2);
  color: var(--ink);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-size: 12px;
  font-family: 'Fira Code', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.fld input:focus { border-color: var(--accent); }
#mi { width: 150px; }
#xi { width: 65px; }

.btn-go {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  padding: 7px 20px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Source Sans 3', sans-serif;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  margin-left: auto;
  letter-spacing: 0.02em;
}
.btn-go:hover    { background: var(--accent2); }
.btn-go:active   { transform: scale(0.97); }
.btn-go:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── Status ── */
#st {
  display: none;
  margin-top: 1rem;
  padding: 0.85rem 1.3rem;
  background: var(--paper2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  font-size: 13px;
  color: var(--muted);
  align-items: center;
  gap: 10px;
  font-family: 'Fira Code', monospace;
}
.spin {
  width: 14px; height: 14px;
  border: 1.5px solid var(--line2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
#st.err { border-color: rgba(196,98,45,0.3); color: var(--accent); }
#st.err .spin { display: none; }

/* ── Results ── */
#res { display: none; margin-top: 2.5rem; }

/* Stats row */
.srow {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 2rem;
}
.scel {
  background: var(--paper2);
  padding: 1rem 1.2rem;
}
.scel .sl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.09em; color: var(--muted); margin-bottom: 4px; }
.scel .sv { font-family: 'Playfair Display', serif; font-size: 1.8rem; line-height: 1; color: var(--ink); }
.scel .ss { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* Summary block */
.summary-block {
  margin-bottom: 2rem;
  padding: 1.8rem 2rem;
  background: var(--paper2);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  position: relative;
}
.summary-block::before {
  content: '"';
  position: absolute;
  top: 0.5rem;
  left: 1.5rem;
  font-family: 'Playfair Display', serif;
  font-size: 4rem;
  color: var(--accent);
  opacity: 0.2;
  line-height: 1;
}
.summary-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 0.8rem;
  font-family: 'Fira Code', monospace;
}
.summary-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  line-height: 1.75;
  font-style: italic;
  color: var(--ink);
}

/* Vibe tag */
.vibe-tag {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-top: 1rem;
  padding: 5px 12px;
  background: var(--paper);
  border: 1px solid var(--line2);
  border-radius: 2px;
  font-size: 12px;
  color: var(--muted);
  font-family: 'Fira Code', monospace;
}
.vibe-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

/* Two-column layout */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1rem;
}
@media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } .srow { grid-template-columns: 1fr 1fr; } }

.card {
  background: var(--paper2);
  border: 1px solid var(--line2);
  border-radius: var(--radius);
  padding: 1.2rem 1.4rem;
}
.card-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-family: 'Fira Code', monospace;
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--line);
}

/* Participants */
.participant { margin-bottom: 1.1rem; }
.participant:last-child { margin-bottom: 0; }

.p-head { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; }
.avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  font-family: 'Playfair Display', serif;
  font-size: 11px;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: 1px solid var(--line2);
}
.av0 { background: rgba(196,98,45,0.12); color: var(--accent); }
.av1 { background: rgba(74,124,89,0.12);  color: var(--green); }
.av2 { background: rgba(26,24,20,0.08);   color: var(--ink); }
.av3 { background: rgba(138,130,120,0.15); color: var(--muted); }

.p-name { font-size: 13px; font-weight: 500; }
.p-share { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--muted); margin-left: auto; }

.p-bar { height: 2px; background: var(--line); border-radius: 1px; margin-bottom: 5px; overflow: hidden; }
.p-fill { height: 100%; border-radius: 1px; transition: width 1s cubic-bezier(0.16,1,0.3,1); }
.pf0 { background: var(--accent); }
.pf1 { background: var(--green); }
.pf2 { background: var(--ink); }
.pf3 { background: var(--muted); }

.p-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

.p-stats { display: flex; gap: 10px; margin-top: 3px; }
.p-stats span { font-family: 'Fira Code', monospace; font-size: 10px; color: var(--muted); }

/* Topics */
.topic-list { display: flex; flex-direction: column; gap: 5px; }
.topic-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  font-size: 13px;
  padding: 7px 10px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  line-height: 1.4;
}
.topic-num {
  font-family: 'Fira Code', monospace;
  font-size: 10px;
  color: var(--accent);
  opacity: 0.6;
  flex-shrink: 0;
  padding-top: 1px;
}

/* Reset button */
.breset {
  display: block;
  margin: 2.5rem 0 0;
  background: transparent;
  border: 1px solid var(--line2);
  color: var(--muted);
  border-radius: var(--radius);
  padding: 7px 16px;
  font-size: 12px;
  cursor: pointer;
  font-family: 'Fira Code', monospace;
  transition: border-color 0.15s, color 0.15s;
  letter-spacing: 0.02em;
}
.breset:hover { border-color: var(--accent); color: var(--accent); }

/* Fade-in */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeUp 0.5s ease both; }
</style>
</head>
<body>

<header>
  <div class="wordmark">Chat <em>Analyzer</em></div>
  <div class="srv-status">
    <div class="dot" id="dot"></div>
    <span id="slbl">проверяю…</span>
  </div>
</header>

<main>
  <div id="upload-zone">
    <input type="file" id="fi" accept=".json,.txt">
    <div class="up-glyph">↑</div>
    <h2>Загрузи файл переписки</h2>
    <p>Перетащи сюда или нажми для выбора</p>
    <div class="formats">
      <span class="fmt">Telegram .json</span>
      <span class="fmt">WhatsApp .txt</span>
      <span class="fmt">plain .txt</span>
    </div>
  </div>

  <div id="sbar">
    <div class="fbadge">
      <span class="fbadge-icon">§</span>
      <span id="fn">file</span>
    </div>
    <div class="fld">
      <label>Модель</label>
      <input type="text" id="mi" value="gemma3:4b">
    </div>
    <div class="fld">
      <label>Сообщений</label>
      <input type="number" id="xi" value="300" min="50" max="800">
    </div>
    <button class="btn-go" id="brun">Анализировать</button>
  </div>

  <div id="st"><div class="spin"></div><span id="stxt">…</span></div>
  <div id="res"></div>
</main>

<script>
const API = '';
let curFile = null;

async function checkSrv() {
  const dot = document.getElementById('dot'), lbl = document.getElementById('slbl');
  try {
    const r = await fetch(API + '/health');
    const d = await r.json();
    if (d.ok) {
      dot.className = 'dot ok';
      lbl.textContent = 'сервер работает' + (d.models.length ? ` · ${d.models.length} моделей` : '');
      if (d.models.length) document.getElementById('mi').value = d.models[0].split(':').slice(0,2).join(':');
    } else throw 0;
  } catch {
    dot.className = 'dot err';
    lbl.textContent = 'сервер не запущен — python server.py';
  }
}
checkSrv(); setInterval(checkSrv, 10000);

const setSt = (msg, err) => {
  const el = document.getElementById('st');
  el.style.display = 'flex'; el.className = err ? 'err' : '';
  document.getElementById('stxt').textContent = msg;
};
const hideSt = () => document.getElementById('st').style.display = 'none';

document.getElementById('fi').addEventListener('change', function() {
  const f = this.files[0]; if (!f) return;
  curFile = f;
  document.getElementById('fn').textContent = f.name;
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('sbar').style.display = 'flex';
  hideSt();
});

const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  if (!e.dataTransfer.files[0]) return;
  document.getElementById('fi').files = e.dataTransfer.files;
  document.getElementById('fi').dispatchEvent(new Event('change'));
});

document.getElementById('brun').addEventListener('click', async () => {
  if (!curFile) return;
  const model = document.getElementById('mi').value.trim() || 'gemma3:4b';
  const max   = document.getElementById('xi').value || '300';
  const btn   = document.getElementById('brun');
  btn.disabled = true;
  document.getElementById('res').style.display = 'none';
  setSt(`Отправляю → ${model} … подожди 30–90 сек`, false);
  const form = new FormData();
  form.append('file', curFile);
  form.append('model', model);
  form.append('max_msgs', max);
  try {
    const r = await fetch(API + '/analyze', { method: 'POST', body: form });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Ошибка сервера');
    hideSt();
    render(d.stats, d.analysis);
  } catch(e) {
    setSt('Ошибка: ' + e.message, true);
  } finally {
    btn.disabled = false;
  }
});

function ini(n) {
  return n.split(/[\s_]/).map(w => w[0]?.toUpperCase() || '').join('').slice(0, 2) || '?';
}

function render(s, a) {
  const authors  = s.authors;
  const summary  = a.summary  || a.общий_вывод || '—';
  const topics   = a.topics   || a.основные_темы || [];
  const vibe     = a.vibe     || a.атмосфера || '';
  const parts    = a.participants || a.участники || {};

  let h = '';

  const totalWords = Object.values(s.words).reduce((a, b) => a + b, 0);
  const topAuthor  = authors.reduce((a, b) => s.counts[a] > s.counts[b] ? a : b);
  h += `<div class="srow fade-in">
    <div class="scel"><div class="sl">Сообщений</div><div class="sv">${s.total.toLocaleString()}</div></div>
    <div class="scel"><div class="sl">Участников</div><div class="sv">${authors.length}</div><div class="ss">${authors.join(', ')}</div></div>
    <div class="scel"><div class="sl">Слов</div><div class="sv">${totalWords.toLocaleString()}</div></div>
    <div class="scel"><div class="sl">Активнее всех</div><div class="sv" style="font-size:1.1rem;padding-top:6px">${topAuthor}</div><div class="ss">${s.share[topAuthor]}% сообщений</div></div>
  </div>`;

  h += `<div class="summary-block fade-in" style="animation-delay:0.08s">
    <div class="summary-label">Характеристика</div>
    <div class="summary-text">${summary}</div>
    ${vibe ? `<div class="vibe-tag"><div class="vibe-dot"></div>${vibe}</div>` : ''}
  </div>`;

  h += `<div class="two-col">`;

  h += `<div class="card fade-in" style="animation-delay:0.14s"><div class="card-title">Участники</div>`;
  authors.forEach((au, i) => {
    const desc = parts[au] || '—';
    h += `<div class="participant">
      <div class="p-head">
        <div class="avatar av${i % 4}">${ini(au)}</div>
        <span class="p-name">${au}</span>
        <span class="p-share">${s.share[au]}%</span>
      </div>
      <div class="p-bar"><div class="p-fill pf${i % 4}" style="width:0%" data-w="${s.share[au]}%"></div></div>
      <div class="p-desc">${desc}</div>
      <div class="p-stats">
        <span>${s.counts[au]} сообщ.</span>
        <span>${s.words[au]} слов</span>
        <span>ср. ${s.avg_len[au]} симв.</span>
      </div>
    </div>`;
  });
  h += `</div>`;

  h += `<div class="card fade-in" style="animation-delay:0.18s"><div class="card-title">Темы</div><div class="topic-list">`;
  if (topics.length) {
    topics.forEach((t, i) => {
      h += `<div class="topic-item"><span class="topic-num">${String(i + 1).padStart(2, '0')}</span>${t}</div>`;
    });
  } else {
    h += `<span style="font-size:13px;color:var(--muted)">Не определены</span>`;
  }
  h += `</div></div>`;

  h += `</div>`;

  h += `<button class="breset" onclick="reset()">← Новый анализ</button>`;

  const el = document.getElementById('res');
  el.innerHTML = h;
  el.style.display = 'block';

  setTimeout(() => {
    el.querySelectorAll('.p-fill').forEach(b => {
      const w = b.dataset.w;
      requestAnimationFrame(() => requestAnimationFrame(() => { b.style.width = w; }));
    });
  }, 60);
}

function reset() {
  curFile = null;
  document.getElementById('res').style.display = 'none';
  document.getElementById('res').innerHTML = '';
  document.getElementById('sbar').style.display = 'none';
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('fi').value = '';
  hideSt();
}
</script>
</body>
</html>
